<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Autentificare - Bloc X69</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), url('../static/images/login-bg.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h2 class="mb-4">🏠 Bloc X69</h2>
        <p class="text-muted">Autentificare Personal</p>
        
        {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form action="/login" method="POST">
            <input type="text" name="username" class="form-control mb-3" placeholder="Utilizator" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Parolă" required>
            <button type="submit" class="btn btn-primary w-100 py-2">Intră în cont</button>
        </form>
    </div>
</body>
</html>
